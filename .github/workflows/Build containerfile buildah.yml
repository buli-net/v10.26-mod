name: Build Bitcoin Wallet - Containerfile.buildah

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah fuse-overlayfs

      - name: Build with build.Containerfile.buildah
        run: |
          mkdir -p out
          sudo buildah bud \
            --cap-add SYS_ADMIN \
            --device /dev/fuse \
            -f build.Containerfile.buildah \
            --target export-stage \
            -t wallet-export .
          
          ctr=$(sudo buildah from wallet-export)
          mnt=$(sudo buildah mount $ctr)
          sudo cp -r $mnt/apk out/
          sudo buildah umount $ctr
          sudo buildah rm $ctr
          find out -type f -name "*.apk"

      - name: Prepare folders
        run: |
          mkdir -p wallet/build/outputs/apk/dev/debug
          mkdir -p wallet/build/outputs/apk/dev/release
          mkdir -p wallet/build/outputs/apk/prod/debug
          mkdir -p wallet/build/outputs/apk/prod/release
          cp out/apk/dev/debug/*.apk wallet/build/outputs/apk/dev/debug/bitcoin-wallet-dev-debug.apk
          cp out/apk/dev/release/*.apk wallet/build/outputs/apk/dev/release/bitcoin-wallet-dev-release-unsigned.apk
          cp out/apk/prod/debug/*.apk wallet/build/outputs/apk/prod/debug/bitcoin-wallet-prod-debug.apk
          cp out/apk/prod/release/*.apk wallet/build/outputs/apk/prod/release/bitcoin-wallet-prod-release-unsigned.apk

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign devRelease
        run: |
          APK=wallet/build/outputs/apk/dev/release/bitcoin-wallet-dev-release-unsigned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK"

      - name: Sign prodRelease
        run: |
          APK=wallet/build/outputs/apk/prod/release/bitcoin-wallet-prod-release-unsigned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK"

      - name: Verify
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs wallet/build/outputs/apk/dev/release/*.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs wallet/build/outputs/apk/prod/release/*.apk

      - name: Final APKs
        run: |
          mkdir -p final
          cp wallet/build/outputs/apk/dev/debug/*.apk final/bitcoin-wallet-dev-debug.apk
          cp wallet/build/outputs/apk/dev/release/*.apk final/bitcoin-wallet-dev-release-signed.apk
          cp wallet/build/outputs/apk/prod/debug/*.apk final/bitcoin-wallet-prod-debug.apk
          cp wallet/build/outputs/apk/prod/release/*.apk final/bitcoin-wallet-prod-release-signed.apk
          ls -lh final

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: bitcoin-wallet-all-variants
          path: final/*.apk
          retention-days: 90