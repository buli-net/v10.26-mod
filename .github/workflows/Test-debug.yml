# =================================================================
# FILE: .github/workflows/build-10.26-debug.yml
# MỤC ĐÍCH: Build APK debug cho buli-net/v10.26 (Bitcoin Wallet)
# PHIÊN BẢN CUỐI 2026-06-21:
#  - Fix hết cảnh báo Node.js 20 deprecated (nâng tất cả actions lên Node 24)
#  - Bật lại cache Gradle + bật Build Scan
#  - Giữ artifact lâu nhất có thể (90 ngày cho repo public)
# =================================================================

name: Build Bitcoin Wallet - Debug

on:
  # Cho phép chạy thủ công từ tab Actions > Run workflow
  workflow_dispatch:

jobs:
  build:
    # Ubuntu 22.04 ổn định với Gradle 6.9.4 + JDK 11
    runs-on: ubuntu-22.04

    steps:
      # -----------------------------------------------------------------
      # BƯỚC 1: Lấy mã nguồn
      # - actions/checkout@v5 = bản chạy Node 24 (v4 còn Node 20 → bị warning)
      # - fetch-depth: 0 = lấy full lịch sử git, cần cho versionCode tự động
      # -----------------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # -----------------------------------------------------------------
      # BƯỚC 2: Cài JDK 17 (chỉ để chạy sdkmanager)
      # - Từ Android cmdline-tools 16+, sdkmanager bắt buộc JDK 17+
      # - Nếu dùng JDK 11 sẽ lỗi: "This tool requires JDK 17 or later"
      # -----------------------------------------------------------------
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # -----------------------------------------------------------------
      # BƯỚC 3: Cài Android SDK 34
      # - android-actions/setup-android@v4 đã migrate sang Node 24
      # - Cài platform-tools, platform android-34 và build-tools 34.0.0
      # -----------------------------------------------------------------
      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # -----------------------------------------------------------------
      # BƯỚC 4: Chuyển về JDK 11 (để build)
      # - Bitcoin Wallet v10.26 dùng Gradle 6.9.4 → chỉ tương thích Java 11
      # - cache: gradle = lưu Gradle wrapper giữa các lần chạy
      # -----------------------------------------------------------------
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      # -----------------------------------------------------------------
      # BƯỚC 5: Cài Gradle + BẬT CACHE + BẬT BUILD SCAN
      # - gradle/actions/setup-gradle@v5 = bản Node 24 (v4 còn Node 20)
      # - cache-provider: basic = dùng @actions/cache mã nguồn mở
      #   → tránh lỗi "Cache service responded with 400" của cache cũ
      # - build-scan-publish: true → sau build sẽ có link Build Scan
      #   (xem chi tiết từng task, thời gian, dependency)
      # -----------------------------------------------------------------
      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '6.9.4'
          cache-disabled: false
          cache-provider: basic
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      # -----------------------------------------------------------------
      # BƯỚC 6: Ép phiên bản library (fix lỗi Gradle 6 với Guava mới)
      # - Guava 33+ có 2 variant khiến Gradle 6.9 không chọn được
      # - Force về 31.1-android + ép AndroidX về version an toàn
      # -----------------------------------------------------------------
      - name: Force library versions for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # -----------------------------------------------------------------
      # BƯỚC 7: Build APK
      # - assembleProdDebug = flavor prod + buildType debug
      # - --scan = tạo Build Scan (kết hợp với setup ở trên)
      # -----------------------------------------------------------------
      - name: Build prodDebug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleProdDebug --no-daemon -Pandroid.buildToolsVersion=34.0.0 --scan --stacktrace

      # -----------------------------------------------------------------
      # BƯỚC 8: Xác minh chữ ký
      # -----------------------------------------------------------------
      - name: Verify and print debug certificate
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "=== Xác minh chữ ký APK debug ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"

      # -----------------------------------------------------------------
      # BƯỚC 9: Đổi tên file
      # -----------------------------------------------------------------
      - name: Rename APK to bitcoin-wallet-debug.apk
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "$DIR/bitcoin-wallet-debug.apk"

      # -----------------------------------------------------------------
      # BƯỚC 10: Upload artifact
      # - actions/upload-artifact@v6 = bản chạy Node 24 (v4/v5 còn Node 20)
      # - name: debug-apk = tên hiển thị trong tab Artifacts
      # - path: nơi chứa APK sau khi build
      # - retention-days: 90 = GIỮ LÂU NHẤT CÓ THỂ cho repo public
      #   (GitHub chỉ cho phép tối đa 90 ngày với public, 400 ngày với private)
      # -----------------------------------------------------------------
      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: wallet/build/outputs/apk/prod/debug/*.apk
          retention-days: 90
