name: Build Bitcoin Wallet - All Real Variants - Container

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with: { ref: main, fetch-depth: 0 }

      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }

      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Patch build.Containerfile
        run: |
          sed -i 's|FROM debian:bullseye-backports|FROM debian:bullseye-slim|' build.Containerfile
          sed -i '/ENV DEBIAN_FRONTEND/a RUN echo '\''deb http://archive.debian.org/debian bullseye main'\'' > /etc/apt/sources.list && echo '\''deb http://archive.debian.org/debian bullseye-backports main'\'' >> /etc/apt/sources.list && echo '\''Acquire::Check-Valid-Until "false";'\'' > /etc/apt/apt.conf.d/99no-check' build.Containerfile
          sed -i 's|:wallet:assembleRelease|:wallet:assembleDevDebug :wallet:assembleDevRelease :wallet:assembleProdDebug :wallet:assembleProdRelease|' build.Containerfile
          sed -i 's|COPY --from=build-stage /home/builder/project/wallet/build/outputs/apk/\*/release/bitcoin-wallet-\*-release-unsigned.apk /|COPY --from=build-stage /home/builder/project/wallet/build/outputs/apk/*/*/*.apk /|' build.Containerfile

      - name: Install buildah
        run: sudo apt-get update && sudo apt-get install -y buildah fuse-overlayfs

      - name: Build APKs via Containerfile
        run: |
          mkdir -p out
          sudo buildah bud --cap-add SYS_ADMIN --device /dev/fuse -f build.Containerfile --target export-stage -t wallet-export .
          ctr=$(sudo buildah from wallet-export)
          mnt=$(sudo buildah mount $ctr)
          sudo cp $mnt/*.apk out/
          sudo buildah umount $ctr
          sudo buildah rm $ctr
          ls -lh out

      - name: Prepare folders
        run: |
          mkdir -p wallet/build/outputs/apk/dev/{debug,release} wallet/build/outputs/apk/prod/{debug,release}
          cp out/*dev*debug*.apk wallet/build/outputs/apk/dev/debug/
          cp out/*dev*release*.apk wallet/build/outputs/apk/dev/release/
          cp out/*prod*debug*.apk wallet/build/outputs/apk/prod/debug/
          cp out/*prod*release*.apk wallet/build/outputs/apk/prod/release/

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign devRelease
        run: |
          APK=$(find wallet/build/outputs/apk/dev/release -name "*.apk")
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK"

      - name: Sign prodRelease
        run: |
          APK=$(find wallet/build/outputs/apk/prod/release -name "*.apk")
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK"

      - name: Verify
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs wallet/build/outputs/apk/dev/release/*.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs wallet/build/outputs/apk/prod/release/*.apk

      - name: Rename and upload
        run: |
          mkdir final
          mv wallet/build/outputs/apk/dev/debug/*.apk final/bitcoin-wallet-dev-debug.apk
          mv wallet/build/outputs/apk/dev/release/*.apk final/bitcoin-wallet-dev-release-signed.apk
          mv wallet/build/outputs/apk/prod/debug/*.apk final/bitcoin-wallet-prod-debug.apk
          mv wallet/build/outputs/apk/prod/release/*.apk final/bitcoin-wallet-prod-release-signed.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: bitcoin-wallet-all-variants
          path: final/*.apk
          retention-days: 90