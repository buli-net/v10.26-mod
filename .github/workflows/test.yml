name: Build Bitcoin Wallet v10.26

on:
  workflow_dispatch:   # chạy tay từ tab Actions
  push:
    paths:
      - 'build.Containerfile'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài buildah + fuse
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah fuse-overlayfs

      - name: Build APK (reproducible)
        run: |
          mkdir -p out
          sudo buildah build \
            --cap-add SYS_ADMIN \
            --device /dev/fuse \
            --file build.Containerfile \
            --output out \
            .

      - name: Liệt kê kết quả
        run: ls -lh out

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-v10.26-unsigned
          path: out/*.apk
          retention-days: 7