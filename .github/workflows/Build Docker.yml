name: Build Bitcoin Wallet - Full Verify

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 0. IN THÔNG TIN MÔI TRƯỜNG
      - name: Print runner info
        run: |
          echo "=== RUNNER ==="
          uname -a
          date -u
          echo "GitHub SHA: $GITHUB_SHA"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # lấy full history để verify

      - name: Verify source commit
        run: |
          echo "=== SOURCE VERIFICATION ==="
          git log -1 --pretty=full
          git rev-parse HEAD > commit.txt
          echo "Commit: $(cat commit.txt)"
          find . -type f -name "*.gradle*" -o -name "*.kt" -o -name "*.java" | head -20

      - name: Setup JDK 17 for apksigner
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. BUILD
      - name: Build APKs with Containerfile
        run: |
          mkdir -p out
          DOCKER_BUILDKIT=1 docker build \
            -f build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            --no-cache \
            .
          echo "=== APK RAW (chưa ký) ==="
          ls -lh out
          sha256sum out/*.apk | tee out/raw-sha256.txt

      # 2. KEYSTORE INFO
      - name: Decode keystore & print info
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "=== KEYSTORE INFO ==="
          keytool -list -v -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" | tee keystore-info.txt
          grep -E "SHA1:|SHA256:|Owner:|Valid" keystore-info.txt

      # 3. KÝ
      - name: Sign APKs
        run: |
          echo "=== SIGNING ==="
          for apk in out/*release*.apk; do
            orig=$(basename "$apk")
            clean=$(echo "$orig" | sed 's/-unsigned//' | sed 's/\.apk$//')
            outname="${clean}-signed.apk"
            echo "Signing $orig -> $outname"
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "out/$outname" "$apk" \
              --verbose
          done
          rm -f out/*release*.apk
          ls -lh out

      # 4. VERIFY CHI TIẾT
      - name: Verify signatures (full dump)
        run: |
          echo "=== VERIFY ==="
          for apk in out/*-signed.apk; do
            echo "----------------------------------------"
            echo "FILE: $(basename $apk)"
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$apk"
          done

      # 5. AAPT DUMP (xác minh package name, version)
      - name: Dump APK info
        run: |
          echo "=== APK INFO ==="
          for apk in out/*.apk; do
            echo "--- $(basename $apk) ---"
            aapt dump badging "$apk" | grep -E "package:|version|sdkVersion|application-label"
          done

      # 6. XÁC THỰC FINGERPRINT
      - name: Confirm authenticity
        env:
          EXPECTED_SHA256: ${{ secrets.EXPECTED_CERT_SHA256 }}
        run: |
          echo "=== AUTHENTICITY CHECK ==="
          echo "Expected SHA-256: $EXPECTED_SHA256"
          for apk in out/*-signed.apk; do
            ACTUAL=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$apk" 2>/dev/null | grep "SHA-256" | awk '{print $NF}')
            FILE=$(basename $apk)
            echo "$FILE : $ACTUAL"
            if [ "$ACTUAL" = "$EXPECTED_SHA256" ]; then
              echo "✅ $FILE - THẬT"
            else
              echo "❌ $FILE - GIẢ !!!"
              exit 1
            fi
          done

      # 7. TẠO BÁO CÁO CUỐI
      - name: Generate final report
        run: |
          echo "=== FINAL REPORT ===" > report.txt
          echo "Build time: $(date -u)" >> report.txt
          echo "Commit: $(cat commit.txt)" >> report.txt
          echo "" >> report.txt
          echo "--- SHA256 APK ---" >> report.txt
          sha256sum out/*.apk >> report.txt
          echo "" >> report.txt
          echo "--- CERTS ---" >> report.txt
          for apk in out/*-signed.apk; do
            echo "$(basename $apk):" >> report.txt
            apksigner verify --print-certs "$apk" | grep digest >> report.txt
          done
          cat report.txt

      # 8. UPLOAD
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-verified
          path: |
            out/*.apk
            out/*.txt
            report.txt
            keystore-info.txt