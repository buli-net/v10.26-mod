name: Build Bitcoin Wallet - Docker - Full Verify
# Builds Bitcoin Wallet 10.26 from source using the original Debian bullseye container,
# signs the release APKs, keeps debug APKs, and prints full verification info.
# Updated to actions that run on Node.js 24 (no more deprecation warning).

on:
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 0. Print runner information for traceability
      # ------------------------------------------------------------------
      - name: 0. Print runner info
        run: |
          echo "=== RUNNER INFO ==="
          uname -a
          date -u
          echo "GitHub SHA: $GITHUB_SHA"

      # ------------------------------------------------------------------
      # 1. Checkout source - uses v5 (Node 24 support)
      # ------------------------------------------------------------------
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # get full history to verify commit

      - name: 1. Verify source commit
        run: |
          echo "=== SOURCE VERIFICATION ==="
          git log -1 --pretty=full
          git rev-parse HEAD > commit.txt

      # ------------------------------------------------------------------
      # 2. Install JDK 17 - uses setup-java@v5 (Node 24)
      #    JDK17 is only for apksigner, NOT for building (build uses JDK11 in Docker)
      # ------------------------------------------------------------------
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # ------------------------------------------------------------------
      # 3. Install Android SDK - uses setup-android@v4 (Node 24 fix)
      # ------------------------------------------------------------------
      - uses: android-actions/setup-android@v4

      # ------------------------------------------------------------------
      # 4. Install Docker Buildx - v3.11+ supports Node 24
      # ------------------------------------------------------------------
      - uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 5. Build 4 APKs inside Docker (keeps original build standard)
      # ------------------------------------------------------------------
      - name: 2. Build APKs with Docker
        run: |
          set -e
          mkdir -p out
          # Build the container and export APKs to ./out
          DOCKER_BUILDKIT=1 docker build \
            -f build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            .
          echo "=== RAW APKs AFTER BUILD ==="
          ls -lh out/
          # Create SHA256 hashes for integrity check
          sha256sum out/*.apk | tee out/raw-sha256.txt

      # ------------------------------------------------------------------
      # 6. Decode keystore from GitHub secret
      # ------------------------------------------------------------------
      - name: 3. Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "=== KEYSTORE INFO ==="
          keytool -list -v -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" | tee keystore-info.txt

      # ------------------------------------------------------------------
      # 7. Find apksigner (do not hardcode version)
      # ------------------------------------------------------------------
      - name: 4. Find apksigner
        run: |
          # Find the newest apksigner in build-tools
          APK=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          if [ -z "$APK" ]; then
            echo "❌ ERROR: apksigner not found"
            exit 1
          fi
          echo "APKSIGNER=$APK" >> $GITHUB_ENV
          echo "Using apksigner: $APK"
          "$APK" --version

      # ------------------------------------------------------------------
      # 8. Sign release APKs only (debug APKs stay unsigned)
      # ------------------------------------------------------------------
      - name: 5. Sign release APKs
        run: |
          set -e
          shopt -s nullglob  # empty array if no match
          files=(out/*release*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ No release APKs found"
            ls -lh out/
            exit 1
          fi
          for apk in "${files[@]}"; do
            orig=$(basename "$apk")
            # Remove '-unsigned' suffix if present, then add '-signed'
            clean=$(echo "$orig" | sed 's/-unsigned//' | sed 's/\.apk$//')
            outname="${clean}-signed.apk"
            echo ">> Signing $orig -> $outname"
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "out/$outname" "$apk"
            echo "✓ Done"
          done
          # Remove unsigned intermediates to avoid confusion
          rm -f out/*release.apk out/*release-unsigned.apk 2>/dev/null || true
          ls -lh out/

      # ------------------------------------------------------------------
      # 9. Verify signatures and print certificates
      # ------------------------------------------------------------------
      - name: 6. Verify signatures
        run: |
          shopt -s nullglob
          for apk in out/*-signed.apk; do
            echo "===== VERIFYING $(basename $apk) ====="
            "$APKSIGNER" verify --verbose --print-certs "$apk"
          done

      # ------------------------------------------------------------------
      # 10. Dump APK metadata using aapt/aapt2 (proper binary discovery)
      # ------------------------------------------------------------------
      - name: 7. Dump APK info
        run: |
          echo "=== APK METADATA ==="
          BUILD_DIR=$(dirname "$APKSIGNER")
          AAPT="$BUILD_DIR/aapt"
          # Fallback to aapt2 if aapt not present
          if [ ! -x "$AAPT" ]; then
            echo "aapt not found, trying aapt2..."
            AAPT="$BUILD_DIR/aapt2"
          fi
          # Final fallback: search entire SDK
          if [ ! -x "$AAPT" ]; then
            AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -1)
          fi
          if [ ! -x "$AAPT" ]; then
            echo "❌ FATAL: neither aapt nor aapt2 found"
            exit 1
          fi
          echo "Using AAPT: $AAPT"
          for apk in out/*.apk; do
            echo "--- $(basename $apk) ---"
            # dump badging prints package name, versionCode, versionName, sdkVersion
            "$AAPT" dump badging "$apk" | grep -E "package:|versionName|versionCode|sdkVersion"
          done

      # ------------------------------------------------------------------
      # 11. Authenticity check - compare SHA-256 fingerprint
      # ------------------------------------------------------------------
      - name: 8. Authenticity check
        env:
          EXPECTED_SHA256: ${{ secrets.EXPECTED_CERT_SHA256 }}
        run: |
          echo "=== FINGERPRINT CHECK ==="
          shopt -s nullglob
          for apk in out/*-signed.apk; do
            ACTUAL=$("$APKSIGNER" verify --print-certs "$apk" | grep "SHA-256" | awk '{print $NF}')
            echo "$(basename $apk): $ACTUAL"
            if [ -n "$EXPECTED_SHA256" ]; then
              if [ "$ACTUAL" = "$EXPECTED_SHA256" ]; then
                echo "✅ AUTHENTIC - matches your keystore"
              else
                echo "❌ FAKE - fingerprint mismatch!"
                echo "Expected: $EXPECTED_SHA256"
                exit 1
              fi
            else
              echo "⚠️ EXPECTED_CERT_SHA256 not set, skipping comparison"
            fi
          done

      # ------------------------------------------------------------------
      # 12. Generate final report
      # ------------------------------------------------------------------
      - name: 9. Generate report
        run: |
          {
            echo "===== BITCOIN WALLET BUILD REPORT ====="
            echo "Build time (UTC): $(date -u)"
            echo "Git commit: $(cat commit.txt)"
            echo ""
            echo "--- SHA256 CHECKSUMS ---"
            sha256sum out/*.apk
          } | tee report.txt

      # ------------------------------------------------------------------
      # 13. Upload artifacts - uses upload-artifact@v4 (Node 24 compatible)
      # ------------------------------------------------------------------
      - name: 10. Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-verified
          path: |
            out/*.apk
            out/*.txt
            report.txt
            keystore-info.txt