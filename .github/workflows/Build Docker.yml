name: Build Bitcoin Wallet - Docker bullseye

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup JDK 17 for apksigner
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APKs with Containerfile
        run: |
          mkdir -p out
          DOCKER_BUILDKIT=1 docker build \
            -f build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            .
          echo "=== APKs built ==="
          ls -lh out

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign APKs
        run: |
          for apk in out/*.apk; do
            echo "Signing $apk"
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
              --ks keystore.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out "${apk%.apk}-signed.apk" "$apk"
          done
          ls -lh out

      - name: Verify signatures
        run: |
          for apk in out/*-signed.apk; do
            echo "=== $apk ==="
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$apk"
          done

      - name: Upload signed APKs
        uses: actions/upload-artifact@v6
        with:
          name: bitcoin-wallet-10.26-release
          path: out/*-signed.apk
          retention-days: 90