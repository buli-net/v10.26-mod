name: Build Bitcoin Wallet - Docker (F-Droid original)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 17 (for apksigner)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with original build.Containerfile
        run: |
          mkdir -p out
          DOCKER_BUILDKIT=1 docker build \
            --file build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            .
          echo "=== APKs from container ==="
          find out -type f -name "*.apk" -exec ls -lh {} \;

      - name: Prepare folders
        run: |
          mkdir -p wallet/build/outputs/apk/dev/{debug,release}
          mkdir -p wallet/build/outputs/apk/prod/{debug,release}
          # F-Droid container xuất ra 4 file trong out/
          cp out/*dev*debug*.apk wallet/build/outputs/apk/dev/debug/bitcoin-wallet-dev-debug.apk || true
          cp out/*dev*release*.apk wallet/build/outputs/apk/dev/release/bitcoin-wallet-dev-release-unsigned.apk || true
          cp out/*prod*debug*.apk wallet/build/outputs/apk/prod/debug/bitcoin-wallet-prod-debug.apk || true
          cp out/*prod*release*.apk wallet/build/outputs/apk/prod/release/bitcoin-wallet-prod-release-unsigned.apk || true
          # fallback nếu tên khác
          find out -name "*.apk" -exec cp {} wallet/build/outputs/apk/ \;

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign devRelease
        run: |
          APK=$(find wallet/build/outputs/apk/dev/release -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK"

      - name: Sign prodRelease
        run: |
          APK=$(find wallet/build/outputs/apk/prod/release -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK"

      - name: Verify signatures
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs wallet/build/outputs/apk/dev/release/*.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs wallet/build/outputs/apk/prod/release/*.apk

      - name: Final APKs
        run: |
          mkdir -p final
          cp wallet/build/outputs/apk/dev/debug/*.apk final/bitcoin-wallet-dev-debug.apk
          cp wallet/build/outputs/apk/dev/release/*.apk final/bitcoin-wallet-dev-release-signed.apk
          cp wallet/build/outputs/apk/prod/debug/*.apk final/bitcoin-wallet-prod-debug.apk
          cp wallet/build/outputs/apk/prod/release/*.apk final/bitcoin-wallet-prod-release-signed.apk
          ls -lh final
          sha256sum final/*.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: bitcoin-wallet-docker-build
          path: final/*.apk
          retention-days: 90