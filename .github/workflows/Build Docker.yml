name: Build Bitcoin Wallet - Full Verify
# Mục đích: build Bitcoin Wallet từ source bằng Docker Debian bullseye,
# ký release, giữ debug, và in đầy đủ thông tin xác minh.

on:
  workflow_dispatch:  # cho phép bấm chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 0. In thông tin máy chạy để đối chiếu
      # ------------------------------------------------------------------
      - name: 0. Print runner info
        run: |
          echo "=== THÔNG TIN MÁY BUILD ==="
          uname -a          # kernel, arch
          date -u           # giờ UTC
          echo "Commit SHA: $GITHUB_SHA"

      # ------------------------------------------------------------------
      # 1. Lấy code
      # ------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # lấy full history để git log chính xác

      - name: 1. Verify source commit
        run: |
          echo "=== XÁC MINH SOURCE ==="
          git log -1 --pretty=full   # in author, date, message
          git rev-parse HEAD > commit.txt  # lưu hash để đưa vào báo cáo

      # ------------------------------------------------------------------
      # 2-4. Cài môi trường
      # ------------------------------------------------------------------
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'   # JDK17 chỉ để chạy apksigner, không dùng build

      - uses: android-actions/setup-android@v3  # cài Android SDK

      - uses: docker/setup-buildx-action@v3     # cài Docker Buildx

      # ------------------------------------------------------------------
      # 5. Build 4 APK trong Docker (giữ nguyên chuẩn gốc)
      # ------------------------------------------------------------------
      - name: 2. Build 4 APKs with Docker
        run: |
          set -e   # dừng ngay nếu lỗi
          mkdir -p out
          DOCKER_BUILDKIT=1 docker build \
            -f build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            .
          echo "=== APK THÔ ==="
          ls -lh out/
          sha256sum out/*.apk | tee out/raw-sha256.txt  # hash để kiểm tra toàn vẹn

      # ------------------------------------------------------------------
      # 6. Giải mã keystore từ secret
      # ------------------------------------------------------------------
      - name: 3. Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "=== KEYSTORE INFO ==="
          keytool -list -v -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" | tee keystore-info.txt

      # ------------------------------------------------------------------
      # 7. Tìm apksigner ĐÚNG CHUẨN (không hardcode version)
      # ------------------------------------------------------------------
      - name: 4. Find apksigner
        run: |
          # Tìm tất cả file tên 'apksigner' trong build-tools, sắp xếp theo version, lấy mới nhất
          APK=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          # Kiểm tra có tìm được không
          if [ -z "$APK" ]; then
            echo "❌ LỖI: Không tìm thấy apksigner trong SDK"
            exit 1
          fi
          # Lưu vào biến môi trường để các bước sau dùng
          echo "APKSIGNER=$APK" >> $GITHUB_ENV
          echo "Dùng apksigner tại: $APK"
          "$APK" --version   # in version để log

      # ------------------------------------------------------------------
      # 8. Ký 2 file release
      # ------------------------------------------------------------------
      - name: 5. Sign release APKs
        run: |
          set -e
          shopt -s nullglob   # nếu không có file, mảng rỗng thay vì giữ pattern
          files=(out/*release*.apk)  # lấy tất cả file chứa 'release'
          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ Không tìm thấy file release"
            ls -lh out/
            exit 1
          fi
          for apk in "${files[@]}"; do
            orig=$(basename "$apk")
            # bỏ '-unsigned' nếu có, bỏ '.apk', rồi thêm '-signed.apk'
            clean=$(echo "$orig" | sed 's/-unsigned//' | sed 's/\.apk$//')
            outname="${clean}-signed.apk"
            echo ">> Ký $orig -> $outname"
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "out/$outname" "$apk"
          done
          # Xóa file chưa ký để tránh nhầm
          rm -f out/*release.apk out/*release-unsigned.apk 2>/dev/null || true
          ls -lh out/

      # ------------------------------------------------------------------
      # 9. Verify và in chứng chỉ
      # ------------------------------------------------------------------
      - name: 6. Verify signatures
        run: |
          shopt -s nullglob
          for apk in out/*-signed.apk; do
            echo "===== $(basename $apk) ====="
            "$APKSIGNER" verify --verbose --print-certs "$apk"
          done

      # ------------------------------------------------------------------
      # 10. Dump thông tin APK - FIX CHUẨN tìm aapt/aapt2
      # ------------------------------------------------------------------
      - name: 7. Dump APK info (aapt)
        run: |
          echo "=== THÔNG TIN APK ==="
          # Lấy thư mục build-tools nơi apksigner đang nằm
          BUILD_TOOLS_DIR=$(dirname "$APKSIGNER")
          # Ưu tiên aapt (bản cũ in badging đẹp), nếu không có thì dùng aapt2
          AAPT="$BUILD_TOOLS_DIR/aapt"
          if [ ! -x "$AAPT" ]; then
            echo "aapt không có, thử aapt2..."
            AAPT="$BUILD_TOOLS_DIR/aapt2"
          fi
          # Nếu vẫn không có (trường hợp SDK lạ), tìm toàn bộ SDK
          if [ ! -x "$AAPT" ]; then
            echo "Tìm aapt trong toàn bộ SDK..."
            AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -1)
          fi
          # Kiểm tra cuối cùng
          if [ -z "$AAPT" ] || [ ! -x "$AAPT" ]; then
            echo "❌ LỖI NGHIÊM TRỌNG: Không tìm thấy aapt hoặc aapt2"
            exit 1
          fi
          echo "Sử dụng AAPT: $AAPT"
          # Lặp qua từng APK và đọc AndroidManifest
          for apk in out/*.apk; do
            echo "--- $(basename $apk) ---"
            # 'dump badging' in ra package name, versionName, versionCode, sdkVersion
            "$AAPT" dump badging "$apk" | grep -E "package:|versionName|versionCode|sdkVersion"
          done

      # ------------------------------------------------------------------
      # 11. So sánh fingerprint để xác thực thật/giả
      # ------------------------------------------------------------------
      - name: 8. Authenticity check
        env:
          EXPECTED_SHA256: ${{ secrets.EXPECTED_CERT_SHA256 }}
        run: |
          echo "=== KIỂM TRA FINGERPRINT ==="
          shopt -s nullglob
          for apk in out/*-signed.apk; do
            ACTUAL=$("$APKSIGNER" verify --print-certs "$apk" | grep "SHA-256" | awk '{print $NF}')
            echo "$(basename $apk): $ACTUAL"
            if [ -n "$EXPECTED_SHA256" ]; then
              if [ "$ACTUAL" = "$EXPECTED_SHA256" ]; then
                echo "✅ THẬT - khớp keystore"
              else
                echo "❌ GIẢ - không khớp!"
                exit 1
              fi
            fi
          done

      # ------------------------------------------------------------------
      # 12. Tạo báo cáo
      # ------------------------------------------------------------------
      - name: 9. Generate report
        run: |
          {
            echo "===== BITCOIN WALLET BUILD REPORT ====="
            echo "Thời gian UTC: $(date -u)"
            echo "Commit: $(cat commit.txt)"
            echo ""
            echo "--- SHA256 ---"
            sha256sum out/*.apk
          } | tee report.txt

      # ------------------------------------------------------------------
      # 13. Upload
      # ------------------------------------------------------------------
      - name: 10. Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-verified
          path: |
            out/*.apk
            report.txt
            keystore-info.txt