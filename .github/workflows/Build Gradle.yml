# =================================================================
# FILE: .github/workflows/build-apk-full.yml
# PURPOSE:
#   - Build 4 APK variants exactly as defined in build.gradle:
#       1. devDebug   (development, debuggable)
#       2. devRelease (optimized dev release)
#       3. prodDebug  (debug with prod resources)
#       4. prodRelease (official production release)
#   - Sign release APKs with keystore
#   - Verify signatures, metadata, and fingerprints
#   - Upload all 4 APKs to GitHub Artifacts
# UPDATED 2026-06-26: Node 24 actions + full verification like Docker build
# =================================================================

name: Build Bitcoin Wallet - All Real Variants - Full APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ----- STEP 0: Runner info -----
      - name: 0. Print runner info
        run: |
          echo "=== RUNNER INFO ==="
          uname -a
          date -u
          echo "GitHub SHA: $GITHUB_SHA"

      # ----- STEP 1: Checkout source -----
      - name: 1. Checkout source code
        uses: actions/checkout@v5.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: 1b. Verify commit
        run: |
          echo "=== SOURCE VERIFICATION ==="
          git log -1 --pretty=full
          git rev-parse HEAD > commit.txt

      # ----- STEP 2: Setup JDK 17 for Android SDK tools -----
      - name: 2. Setup JDK 17 for SDK
        uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: '17'

      # ----- STEP 3: Setup Android SDK 34 -----
      - name: 3. Setup Android SDK 34
        uses: android-actions/setup-android@v4.0.0
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- STEP 4: Setup JDK 11 for Gradle build -----
      - name: 4. Setup JDK 11 for build
        uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: '11'

      # ----- STEP 5: Setup Gradle 6.9.4 with cache -----
      - name: 5. Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v5.0.0
        with:
          gradle-version: '6.9.4'
          cache-disabled: false

      # ----- STEP 6: Force library versions for Gradle 6 compatibility -----
      - name: 6. Force library versions
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # ----- STEP 7: Build all 4 variants -----
      - name: 7. Build all APK variants
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleDevDebug \
                  :wallet:assembleDevRelease \
                  :wallet:assembleProdDebug \
                  :wallet:assembleProdRelease \
                  --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # ----- STEP 8: Decode keystore -----
      - name: 8. Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "=== KEYSTORE INFO ==="
          keytool -list -v -keystore keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}" | tee keystore-info.txt

      # ----- STEP 9: Find build tools dynamically -----
      - name: 9. Find apksigner and aapt
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          AAPT=$(dirname "$APKSIGNER")/aapt
          if [ ! -x "$AAPT" ]; then AAPT=$(dirname "$APKSIGNER")/aapt2; fi
          echo "APKSIGNER=$APKSIGNER" >> $GITHUB_ENV
          echo "AAPT=$AAPT" >> $GITHUB_ENV
          echo "Using apksigner: $APKSIGNER"
          echo "Using aapt: $AAPT"

      # ----- STEP 10: Sign devRelease -----
      - name: 10. Sign devRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/dev/release -name "*.apk" | head -1)
          "$APKSIGNER" sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK_PATH"

      # ----- STEP 11: Sign prodRelease -----
      - name: 11. Sign prodRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/release -name "*.apk" | head -1)
          "$APKSIGNER" sign --ks keystore.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "$APK_PATH"

      # ----- STEP 12: Verify signatures -----
      - name: 12. Verify signatures
        run: |
          for variant in dev/release prod/release; do
            APK_PATH=$(find wallet/build/outputs/apk/${variant} -name "*.apk" | head -1)
            echo "===== VERIFYING $APK_PATH ====="
            "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"
          done

      # ----- STEP 13: Dump APK metadata -----
      - name: 13. Dump APK info
        run: |
          echo "=== APK METADATA ==="
          for apk in wallet/build/outputs/apk/*/*/*.apk; do
            echo "--- $(basename $apk) ---"
            "$AAPT" dump badging "$apk" | grep -E "package:|versionName|versionCode|sdkVersion|application-debuggable"
          done

      # ----- STEP 14: Ensure releases are not debuggable -----
      - name: 14. Check debuggable flag
        run: |
          for apk in wallet/build/outputs/apk/dev/release/*.apk wallet/build/outputs/apk/prod/release/*.apk; do
            if "$AAPT" dump badging "$apk" | grep -q 'application-debuggable'; then
              echo "❌ ERROR: $(basename $apk) is still debuggable!"
              exit 1
            else
              echo "✅ $(basename $apk) is a proper release (not debuggable)"
            fi
          done

      # ----- STEP 15: Authenticity check -----
      - name: 15. Fingerprint check
        env:
          EXPECTED_SHA256: ${{ secrets.EXPECTED_CERT_SHA256 }}
        run: |
          echo "=== FINGERPRINT CHECK ==="
          for apk in wallet/build/outputs/apk/*/*release/*.apk; do
            ACTUAL=$("$APKSIGNER" verify --print-certs "$apk" | grep SHA-256 | awk '{print $NF}')
            echo "$(basename $apk): $ACTUAL"
            if [ -n "$EXPECTED_SHA256" ] && [ "$ACTUAL" != "$EXPECTED_SHA256" ]; then
              echo "❌ MISMATCH"
              exit 1
            fi
          done

      # ----- STEP 16: Rename APKs -----
      - name: 16. Rename APKs
        run: |
          mkdir -p final
          cp wallet/build/outputs/apk/dev/debug/*.apk final/bitcoin-wallet-dev-debug.apk
          cp wallet/build/outputs/apk/dev/release/*.apk final/bitcoin-wallet-dev-release-signed.apk
          cp wallet/build/outputs/apk/prod/debug/*.apk final/bitcoin-wallet-prod-debug.apk
          cp wallet/build/outputs/apk/prod/release/*.apk final/bitcoin-wallet-prod-release-signed.apk
          
          {
            echo "===== BITCOIN WALLET BUILD REPORT (GRADLE) ====="
            echo "Build time (UTC): $(date -u)"
            echo "Git commit: $(cat commit.txt)"
            echo ""
            echo "--- SHA256 CHECKSUMS ---"
            sha256sum final/*.apk
          } > final/report.txt
          ls -lh final

      # ----- STEP 17: Upload artifacts -----
      - name: 17. Upload all APKs
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bitcoin-wallet-all-variants
          path: |
            final/*.apk
            final/report.txt
            keystore-info.txt
          retention-days: 90