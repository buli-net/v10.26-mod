# =================================================================
# FILE: .github/workflows/Build APK Full.yml
# MỤC ĐÍCH:
#   - Build 4 biến thể APK theo đúng cấu hình trong build.gradle:
#       1. devDebug   (dành cho phát triển, có thể gỡ lỗi)
#       2. devRelease (bản release thật trên môi trường dev, đã tối ưu)
#       3. prodDebug  (debug dùng tài nguyên production)
#       4. prodRelease (bản release chính thức, tối ưu và ký)
#   - Ký các bản release (devRelease, prodRelease) bằng keystore riêng
#   - Xác minh bản release không còn flag debuggable
#   - Upload toàn bộ 4 APK lên GitHub Artifact
# BẢN FIX 2026-06-21: nâng Node 24 + bật cache + giữ nguyên logic ký
# =================================================================

name: Build Bitcoin Wallet - All Real Variants - Full APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ----- BƯỚC 1: Lấy mã nguồn -----
      - name: Checkout source code
        uses: actions/checkout@v5          # FIX: v5 = Node 24 (hết warning)
        with:
          ref: main
          fetch-depth: 0

      # ----- BƯỚC 2: JDK 17 cho Android SDK -----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v5       # FIX: v5 = Node 24
        with:
          distribution: temurin
          java-version: '17'

      # ----- BƯỚC 3: Android SDK 34 -----
      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v4   # FIX: v4 = Node 24
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- BƯỚC 4: JDK 11 để build -----
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v5       # FIX: v5
        with:
          distribution: temurin
          java-version: '11'
          # KHÔNG thêm cache: gradle -> để setup-gradle quản lý

      # ----- BƯỚC 5: Gradle 6.9.4 + CACHE -----
      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v5   # FIX: v5 = Node 24
        with:
          gradle-version: '6.9.4'
          cache-disabled: false   # bật cache (sẽ restore 159MB như bản debug)

      # ----- BƯỚC 6: Ép phiên bản thư viện -----
      - name: Force library versions for Gradle 6
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force.gradle <<'EOF'
          allprojects {
            configurations.all {
              exclude group: 'com.google.guava', module: 'listenablefuture'
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                eachDependency { d ->
                  if (d.requested.group.startsWith('androidx.core')) { d.useVersion '1.12.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation') { d.useVersion '1.7.0' }
                  if (d.requested.group == 'androidx.annotation' && d.requested.name == 'annotation-experimental') { d.useVersion '1.3.1' }
                  if (d.requested.group == 'androidx.arch.core') { d.useVersion '2.2.0' }
                  if (d.requested.group == 'androidx.fragment') { d.useVersion '1.6.2' }
                  if (d.requested.group == 'androidx.activity') { d.useVersion '1.8.1' }
                  if (d.requested.group == 'androidx.appcompat') { d.useVersion '1.6.1' }
                  if (d.requested.group == 'androidx.lifecycle') { d.useVersion '2.6.2' }
                  if (d.requested.group == 'androidx.viewpager2') { d.useVersion '1.0.0' }
                  if (d.requested.group == 'androidx.recyclerview') { d.useVersion '1.3.2' }
                }
              }
            }
          }
          EOF

      # ----- BƯỚC 7: Build 4 biến thể -----
      - name: Build all APK variants
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_11_X64
          gradle :wallet:assembleDevDebug \
                  :wallet:assembleDevRelease \
                  :wallet:assembleProdDebug \
                  :wallet:assembleProdRelease \
                  --no-daemon -Pandroid.buildToolsVersion=34.0.0 --stacktrace

      # ----- BƯỚC 8: Giải mã keystore -----
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # ----- BƯỚC 9: Ký devRelease -----
      - name: Sign devRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/dev/release -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK_PATH"

      # ----- BƯỚC 10: Ký prodRelease -----
      - name: Sign prodRelease APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/release -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            "$APK_PATH"

      # ----- BƯỚC 11: Xác minh chữ ký -----
      - name: Verify signatures of release APKs
        run: |
          for variant in dev/release prod/release; do
            APK_PATH=$(find wallet/build/outputs/apk/${variant} -name "*.apk" | head -1)
            echo "Verifying $APK_PATH"
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"
          done

      # ----- BƯỚC 12: Đảm bảo release không debuggable -----
      - name: Ensure release APKs are not debuggable
        run: |
          APK_PROD_REL=$(find wallet/build/outputs/apk/prod/release -name "*.apk" | head -1)
          if aapt dump badging "$APK_PROD_REL" | grep -q 'debuggable="true"'; then
            echo "❌ ERROR: prodRelease.apk vẫn còn debuggable!"
            exit 1
          else
            echo "✅ prodRelease.apk là bản release thật (không debuggable)."
          fi
          
          APK_DEV_REL=$(find wallet/build/outputs/apk/dev/release -name "*.apk" | head -1)
          if aapt dump badging "$APK_DEV_REL" | grep -q 'debuggable="true"'; then
            echo "❌ ERROR: devRelease.apk vẫn còn debuggable!"
            exit 1
          else
            echo "✅ devRelease.apk là bản release thật."
          fi

      # ----- BƯỚC 13: Đổi tên APK -----
      - name: Rename APKs
        run: |
          mkdir -p wallet/build/outputs/apk/final
          cp wallet/build/outputs/apk/dev/debug/*.apk      wallet/build/outputs/apk/final/bitcoin-wallet-dev-debug.apk
          cp wallet/build/outputs/apk/dev/release/*.apk   wallet/build/outputs/apk/final/bitcoin-wallet-dev-release-signed.apk
          cp wallet/build/outputs/apk/prod/debug/*.apk     wallet/build/outputs/apk/final/bitcoin-wallet-prod-debug.apk
          cp wallet/build/outputs/apk/prod/release/*.apk  wallet/build/outputs/apk/final/bitcoin-wallet-prod-release-signed.apk
          rm -rf wallet/build/outputs/apk/dev wallet/build/outputs/apk/prod
          mv wallet/build/outputs/apk/final/* wallet/build/outputs/apk/
          rmdir wallet/build/outputs/apk/final

      # ----- BƯỚC 14: Upload 4 APK -----
      - name: Upload all APKs
        uses: actions/upload-artifact@v6   # FIX: v6 = Node 24
        with:
          name: bitcoin-wallet-all-variants
          path: wallet/build/outputs/apk/*.apk
          retention-days: 90   # thêm để giữ lâu hơn